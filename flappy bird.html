<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bird UI</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#4ec0ca;
}

.game-container{
    width:400px;
    height:600px;
    background:linear-gradient(to bottom,#70c5ce 70%, #ded895 70%);
    border-radius:20px;
    overflow:hidden;
    position:relative;
    box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

.cloud{
    position:absolute;
    top:50px;
    width:80px;
    height:40px;
    background:white;
    border-radius:50px;
    animation:cloudMove 20s linear infinite;
}

.cloud::before,
.cloud::after{
    content:"";
    position:absolute;
    background:white;
    border-radius:50%;
}

.cloud::before{
    width:50px;
    height:50px;
    top:-20px;
    left:10px;
}

.cloud::after{
    width:40px;
    height:40px;
    top:-10px;
    left:40px;
}

@keyframes cloudMove{
    from{ left:100%; }
    to{ left:-100px; }
}

.bird{
    position:absolute;
    top:250px;
    left:100px;
    width:40px;
    height:40px;
    background:yellow;
    border-radius:50%;
}

.bird::after{
    content:"";
    position:absolute;
    right:-10px;
    top:12px;
    width:20px;
    height:15px;
    background:orange;
    border-radius:50%;
}

@keyframes fly{
    from{ transform:translateY(-10px); }
    to{ transform:translateY(10px); }
}

.pipe{
    position:absolute;
    width:60px;
    background:green;
    animation:pipeMove 4s linear infinite;
}

.pipe-top{
    height:200px;
    top:0;
    right:-60px;
}

.pipe-bottom{
    height:200px;
    bottom:60px;
    right:-60px;
}

@keyframes pipeMove{
    from{ right:-60px; }
    to{ right:460px; }
}

.ground{
    position:absolute;
    bottom:0;
    width:100%;
    height:60px;
    background:#d9a441;
}

.score{
    position:absolute;
    top:20px;
    width:100%;
    text-align:center;
    font-size:40px;
    color:white;
    font-weight:bold;
    text-shadow:2px 2px 5px black;
}

.start-btn{
    position:absolute;
    bottom:100px;
    left:50%;
    transform:translateX(-50%);
    padding:10px 25px;
    border:none;
    border-radius:20px;
    background:#ffcc00;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.start-btn:hover{
    transform:translateX(-50%) scale(1.1);
}
</style>
</head>
<body>
<div class="game-container">
    <div class="score">0</div>
    <div class="cloud"></div>
    <div class="bird"></div>
    <div class="pipe pipe-top"></div>
    <div class="pipe pipe-bottom"></div>
    <div class="ground"></div>
    <button class="start-btn">START</button>
</div>
</body>
</html>
