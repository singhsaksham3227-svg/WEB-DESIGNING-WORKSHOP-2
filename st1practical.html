<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sum of Even Numbers</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background: #f9f9f9;
            color: #333;
        }

        h2 { margin-bottom: 10px; }

        input, button {
            padding: 8px;
            margin: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            background: #007bff;
            color: #fff;
            cursor: pointer;
        }
        button:hover { background: #0056b3; }

        #result {
            margin-top: 20px;
            font-weight: bold;
            color: darkblue;
        }
    </style>
</head>
<body>
    <h2>Sum of Even Numbers Calculator</h2>
    
    <label for="numberInput">Enter a number (n): </label>
    <input type="number" id="numberInput" min="1" />
    <button id="calculateBtn">Calculate</button>

    <div id="result"></div>

    <script>
        document.getElementById('calculateBtn').addEventListener('click', calculateSum);

        function calculateSum() {
            const n = parseInt(document.getElementById('numberInput').value);
            let sum = 0;

            for (let i = 2; i <= n; i += 2) {
                sum += i;
            }

            document.getElementById('result').textContent =
                `The sum of even numbers from 1 to ${n} is: ${sum}`;
        }
    </script>
</body>
</html>
